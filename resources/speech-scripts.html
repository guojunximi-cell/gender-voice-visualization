
	<option data-lang="en" value="When the sunlight strikes raindrops in the air, they act as a prism and form a rainbow. The rainbow is a division of white light into many beautiful colors. These take the shape of a long round arch, with its path high above, and its two ends apparently beyond the horizon. There is , according to legend, a boiling pot of gold at one end. People look, but no one ever finds it."
	>Rainbow Passage</option>

	<option data-lang="en" value="You wish to know all about my grandfather. Well, he is nearly 93 years old, yet he still thinks as swiftly as ever. He dresses himself in an old black frock coat, usually several buttons missing. A long beard clings to his chin, giving those who observe him a pronounced feeling of the utmost respect. When he speaks, his voice is just a bit cracked and quivers a bit. Twice each day he plays skillfully and with zest upon a small organ. Except in the winter when the snow or ice prevents, he slowly takes a short walk in the open air each day. We have often urged him to walk more and smoke less, but he always answers, "Banana oil!" Grandfather likes to be modern in his language.">
	Grandfather passage</option>

	<option data-lang="en" value="

	<option data-lang="en" value="

	<option data-lang="en" value="
		From childhood's hour I have not been
		As others were — I have not seen
		As others saw — I could not bring
		My passions from a common spring —
		From the same source I have not taken
		My sorrow — I could not awaken
		My heart to joy at the same tone —
		And all I lov'd — I lov'd alone."
	>Edgar Allan Poe: Alone</option>

	<option data-lang="zh" value="当阳光照射到空气中的雨滴时，它们就像棱镜一样，将白光分解成许多美丽的颜色，形成彩虹。彩虹呈现出长长的圆弧形，路径高悬于天空之上，两端似乎延伸至地平线以外。传说中，彩虹的一端藏着一锅沸腾的黄金。人们不断寻找，却从未有人真正找到它。"
	>彩虹（标准朗读段）</option>

	<option data-lang="zh" value="我爱我的祖国，爱我们伟大的人民。山川秀美，江河奔流，大地宽广无边。春天花开满山，夏天绿树成荫，秋天硕果累累，冬天白雪皑皑。我们生活在这片土地上，共同创造美好的未来，共同守护我们的家园。"
	>我爱祖国</option>

	<option data-lang="zh" value="明月几时有，把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆。人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。"
	>苏轼：水调歌头</option>
